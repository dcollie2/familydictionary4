app = "familydictionary"
primary_region = "iad"
swap_size_mb = 512

[build]

[deploy]
  release_command = "bin/rails db:migrate"

[env]
  PORT = "3000"
  BINDING = "0.0.0.0"
  RAILS_MAX_THREADS = "2"
  RUBY_YJIT_ENABLE = "0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/up"

[[statics]]
  guest_path = "/rails/public"
  url_prefix = "/"
